<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AB Portal</title>
    <!-- Correct Flask-based static CSS reference -->
    <link rel="stylesheet" href="{{ url_for('static', filename='abs.css') }}" />
</head>

<body class="style" style="background-color: rgb(200, 215, 220)">
    <header>
        <h1 class="slide-in">AB</h1>
    </header>

    <div class="navbar">
        <div class="navbar-left">
            <img src="{{ url_for('static', filename='photoes/ab.avif') }}" alt="AB logo" />
        </div>
        <div class="navbar-right">
            <div><a href="{{ url_for('login_page') }}" class="patient-link">for patients</a></div>
            <div><a href="{{ url_for('doctor_login') }}">for doctors</a></div>
            <div><a href="#">for labs</a></div>
            <div><a href="#">Security & help</a></div>
        </div>
    </div>

    <div class="search-bar">
        <div class="location">
            <i>📍</i><input type="text" placeholder="Enter location" />
        </div>
        <div class="search-input">
            <i>🔍</i><input type="text" placeholder="Search doctors, clinics, hospitals, etc." />
        </div>
    </div>

    <hr />

    <div class="doc">
        <div class="doc1 image-container">
            <a href="https://www.youtube.com">
                <img src="{{ url_for('static', filename='photoes/doctor.png') }}" alt="Doctor" width="300" height="200" />
            </a>
        </div>
        <div class="doc2 image-container">
            <a href="https://www.google.com">
                <img src="{{ url_for('static', filename='photoes/doctor2.png') }}" alt="Doctor" width="300" height="200" />
            </a>
        </div>
        <div class="doc3 image-container">
            <a href="https://www.flipkart.com">
                <img src="{{ url_for('static', filename='photoes/doctor3.png') }}" alt="Doctor" width="300" height="200" />
            </a>
        </div>
    </div>
    <hr>
    <div class="emergency" id="emergency">
        <a href="https://www.amazon.com">
            <button class="emergency-button">Emergency</button>
        </a>
    </div>

    <hr />

    <footer>
        <p>© 2023 AB. All rights reserved.</p>
        <p>Contact us: 9876543210 | Email: ab@gmail.com</p>
        <p>Address: Pune, Maharashtra</p>
        <p>Follow us on social media:</p>
        <p>
            <a href="https://www.facebook.com" target="_blank">
                <img src="{{ url_for('static', filename='photoes/facebook.png') }}" alt="Facebook" width="20" height="20" style="border-radius: 25%" />
            </a>
            <a href="https://www.twitter.com" target="_blank">
                <img src="{{ url_for('static', filename='photoes/twitter.png') }}" alt="Twitter" width="20" height="20" style="border-radius: 25%" />
            </a>
            <a href="https://www.instagram.com" target="_blank">
                <img src="{{ url_for('static', filename='photoes/instagram.jpeg') }}" alt="Instagram" width="20" height="20" style="border-radius: 25%" />
            </a>
        </p>
    </footer>
</body>

</html>
